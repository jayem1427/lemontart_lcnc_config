line x1="0" y1="720" x2="1100" y2="720"/>    <line x1="0" y1="760" x2="1100" y2="760"/>    <line x1="0" y1="800" x2="1100" y2="800"/>    <line x1="0" y1="840" x2="1100" y2="840"/>    <line x1="0" y1="880" x2="1100" y2="880"/>  </g>
  <text class="title" x="48" y="48">Lemontart repo — file connections</text>
  <text class="sub" x="48" y="70">How launch, INI, HAL, UI, macros, and tuning modules hang together</text>
  <text class="lbl" x="48" y="108">LAUNCH</text>  <rect x="48" y="118" width="200" height="58" rx="8" fill="#ffffff" stroke="#b7c7bd" stroke-width="1.2" filter="url(#soft)"/>  <text class="h" x="60" y="140">launch.sh</text>  <text class="t" x="60" y="160">Launch_Mill.desktop → here</text>  <rect x="420" y="110" width="260" height="72" rx="8" fill="url(#hub)" filter="url(#soft)"/>  <text class="hubt" x="434" y="136">ethercat_mill.ini</text>  <text class="hubs" x="434" y="156">Main hub: DISPLAY, HAL,</text>  <text class="hubs" x="434" y="172">RS274NGC, TOOL_TABLE</text>  <line x1="248" y1="147" x2="420" y2="147" stroke="#5a6b62" stroke-width="1.6" marker-end="url(#arrow)"/>  <text class="lbl" x="48" y="220">HAL</text>  <rect x="48" y="232" width="220" height="88" rx="8" fill="#ffffff" stroke="#b7c7bd" stroke-width="1.2" filter="url(#soft)"/>  <text class="h" x="60" y="254">ethercat_loadusr.hal</text>  <text class="t" x="60" y="274">loads lcec_conf</text>  <text class="s" x="60" y="289">→ ethercat-conf.xml</text>  <rect x="290" y="232" width="220" height="88" rx="8" fill="#ffffff" stroke="#b7c7bd" stroke-width="1.2" filter="url(#soft)"/>  <text class="h" x="302" y="254">ethercat_mill.hal</text>  <text class="t" x="302" y="274">joints · CiA 402</text>  <text class="s" x="302" y="289">limits · probe mux · laser</text>  <rect x="532" y="232" width="220" height="88" rx="8" fill="#ffffff" stroke="#b7c7bd" stroke-width="1.2" filter="url(#soft)"/>  <text class="h" x="544" y="254">xhc-whb04b-6.hal</text>  <text class="t" x="544" y="274">pendant → halui / jog</text>  <rect x="774" y="232" width="260" height="88" rx="8" fill="#ffffff" stroke="#b7c7bd" stroke-width="1.2" filter="url(#soft)"/>  <text class="h" x="786" y="254">custom.hal</text>  <text class="t" x="786" y="274">→ h100.mb2hal (VFD)</text>  <text class="s" x="786" y="289">+ tune telemetry scales</text>  <line x1="520" y1="182" x2="158" y2="232" stroke="#5a6b62" stroke-width="1.6" marker-end="url(#arrow)"/>  <line x1="550" y1="182" x2="400" y2="232" stroke="#5a6b62" stroke-width="1.6" marker-end="url(#arrow)"/>  <line x1="580" y1="182" x2="642" y2="232" stroke="#5a6b62" stroke-width="1.6" marker-end="url(#arrow)"/>  <line x1="610" y1="182" x2="850" y2="232" stroke="#5a6b62" stroke-width="1.6" marker-end="url(#arrow)"/>  <rect x="48" y="340" width="280" height="52" rx="8" fill="#ffffff" stroke="#b7c7bd" stroke-width="1.2" filter="url(#soft)"/>  <text class="h" x="60" y="362">probe_basic_postgui.hal</text>  <text class="t" x="60" y="382">POSTGUI_HALFILE after UI starts</text>  <line x1="500" y1="182" x2="220" y2="340" stroke="#8a9a91" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#arrow)"/>  <text class="lbl" x="48" y="420">PROBE BASIC UI</text>  <rect x="48" y="432" width="250" height="100" rx="8" fill="#ffffff" stroke="#b7c7bd" stroke-width="1.2" filter="url(#soft)"/>  <text class="h" x="60" y="454">custom_config.yml</text>  <text class="t" x="60" y="474">CONFIG_FILE</text>  <text class="s" x="60" y="489">→ toolchange_dialog.py</text>  <text class="s" x="60" y="504">+ toolchange_dialog_pb.ui</text>  <rect x="320" y="432" width="250" height="100" rx="8" fill="#ffffff" stroke="#b7c7bd" stroke-width="1.2" filter="url(#soft)"/>  <text class="h" x="332" y="454">user_tabs/</text>  <text class="t" x="332" y="474">servo_tuner.py</text>  <text class="s" x="332" y="489">signal_monitor.py</text>  <text class="s" x="332" y="504">laser_setter.py</text>  <rect x="590" y="432" width="230" height="100" rx="8" fill="#ffffff" stroke="#b7c7bd" stroke-width="1.2" filter="url(#soft)"/>  <text class="h" x="602" y="454">tool.tbl</text>  <text class="t" x="602" y="474">TOOL_TABLE</text>  <text class="s" x="602" y="489">updated by M600 flow</text>  <rect x="840" y="432" width="200" height="100" rx="8" fill="#ffffff" stroke="#b7c7bd" stroke-width="1.2" filter="url(#soft)"/>  <text class="h" x="852" y="454">linuxcnc.var</text>  <text class="t" x="852" y="474">PARAMETER_FILE</text>  <text class="s" x="852" y="489">laser + G30 params</text>  <line x1="550" y1="182" x2="550" y2="400" stroke="#5a6b62" stroke-width="1.4"/>  <line x1="550" y1="400" x2="173" y2="432" stroke="#5a6b62" stroke-width="1.6" marker-end="url(#arrow)"/>  <line x1="550" y1="400" x2="445" y2="432" stroke="#5a6b62" stroke-width="1.6" marker-end="url(#arrow)"/>  <line x1="550" y1="400" x2="705" y2="432" stroke="#5a6b62" stroke-width="1.6" marker-end="url(#arrow)"/>  <line x1="550" y1="400" x2="920" y2="432" stroke="#5a6b62" stroke-width="1.6" marker-end="url(#arrow)"/>  <text class="lbl" x="48" y="560">PYTHON + DATA</text>  <rect x="48" y="572" width="300" height="130" rx="8" fill="#ffffff" stroke="#b7c7bd" stroke-width="1.2" filter="url(#soft)"/>  <text class="h" x="60" y="594">probe_basic/python/</text>  <text class="t" x="60" y="614">a6_servo_tune.py  ← hub</text>  <text class="s" x="60" y="629">a6_auto_tune.py</text>  <text class="s" x="60" y="644">a6_graphical_inertia.py</text>  <text class="s" x="60" y="659">hal_signal_logger.py</text>  <text class="s" x="60" y="674">resonance_analysis.py · tune_trial.py</text>  <rect x="370" y="572" width="280" height="130" rx="8" fill="#ffffff" stroke="#b7c7bd" stroke-width="1.2" filter="url(#soft)"/>  <text class="h" x="382" y="594">config/</text>  <text class="t" x="382" y="614">tuning/presets/X|Y|Z/*.json</text>  <text class="s" x="382" y="629">tuning/inertia_settings.json</text>  <text class="s" x="382" y="644">logging/signals.json</text>  <rect x="670" y="572" width="250" height="130" rx="8" fill="#ffffff" stroke="#b7c7bd" stroke-width="1.2" filter="url(#soft)"/>  <text class="h" x="682" y="594">logs/</text>  <text class="t" x="682" y="614">tuning/one_click/…</text>  <text class="s" x="682" y="629">signals/*.csv</text>  <text class="s" x="682" y="644">journals from auto-tune</text>  <rect x="940" y="600" width="120" height="80" rx="8" fill="#eef4f0" stroke="#b7c7bd" stroke-width="1.2" filter="url(#soft)"/>  <text class="h" x="952" y="622">scripts/</text>  <text class="t" x="952" y="642">run_*.py CLIs</text>  <text class="s" x="952" y="657">onto same libs</text>  <line x1="445" y1="532" x2="198" y2="572" stroke="#5a6b62" stroke-width="1.6" marker-end="url(#arrow)"/>  <line x1="445" y1="532" x2="510" y2="572" stroke="#5a6b62" stroke-width="1.6" marker-end="url(#arrow)"/>  <line x1="348" y1="637" x2="370" y2="637" stroke="#8a9a91" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#arrow)"/>  <line x1="650" y1="637" x2="670" y2="637" stroke="#8a9a91" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#arrow)"/>  <line x1="348" y1="657" x2="940" y2="640" stroke="#8a9a91" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#arrow)"/>  <text class="lbl" x="48" y="730">G-CODE / TOOL CHANGE</text>  <rect x="48" y="742" width="240" height="88" rx="8" fill="#ffffff" stroke="#b7c7bd" stroke-width="1.2" filter="url(#soft)"/>  <text class="h" x="60" y="764">linuxcnc-djr.cps</text>  <text class="t" x="60" y="784">Fusion post</text>  <text class="s" x="60" y="799">emits T… M600</text>  <rect x="320" y="742" width="220" height="88" rx="8" fill="#ffffff" stroke="#b7c7bd" stroke-width="1.2" filter="url(#soft)"/>  <text class="h" x="332" y="764">nc_files/</text>  <text class="t" x="332" y="784">programs +</text>  <text class="s" x="332" y="799">m600_tool_change_test.ngc</text>  <rect x="570" y="742" width="320" height="88" rx="8" fill="#ffffff" stroke="#b7c7bd" stroke-width="1.2" filter="url(#soft)"/>  <text class="h" x="582" y="764">probe_basic/subroutines/</text>  <text class="t" x="582" y="784">m600.ngc → tool_touch_off.ngc</text>  <text class="s" x="582" y="799">laser_* · probe_* · on_abort</text>  <rect x="910" y="742" width="140" height="88" rx="8" fill="#eef4f0" stroke="#b7c7bd" stroke-width="1.2" filter="url(#soft)"/>  <text class="h" x="922" y="764">INI REMAP</text>  <text class="t" x="922" y="784">M600 → m600.ngc</text>  <line x1="288" y1="786" x2="320" y2="786" stroke="#5a6b62" stroke-width="1.6" marker-end="url(#arrow)"/>  <line x1="540" y1="786" x2="570" y2="786" stroke="#5a6b62" stroke-width="1.6" marker-end="url(#arrow)"/>  <line x1="910" y1="786" x2="890" y2="786" stroke="#8a9a91" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text class="sub" x="48" y="870">Solid arrows = loads / imports · dashed = writes data or CAM → program path</text>
  <text class="sub" x="48" y="890">Probe Basic ships many probe_*.ngc macros; all share SUBROUTINE_PATH from the INI.</text>
</svg>
