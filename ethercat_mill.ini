[EMC]
VERSION = 1.1
MACHINE = ethercat_mill
DEBUG = 0

[DISPLAY]
DISPLAY = probe_basic
PREFERENCE_FILE = probe_basic.pref
DRO_DISPLAY = XYZA
GEOMETRY = XYZA
TOOL_TABLE_COLUMNS = TDZR
CONFIG_FILE = probe_basic/custom_config.yml
USER_BUTTONS_PATH = probe_basic/user_buttons/
USER_DROS_PATH = probe_basic/user_dro_display/
USER_TABS_PATH = probe_basic/user_tabs/
ATC_TAB_DISPLAY = 0
CYCLE_TIME = 0.100
POSITION_OFFSET = RELATIVE
POSITION_FEEDBACK = ACTUAL
MAX_FEED_OVERRIDE = 2.5
MAX_SPINDLE_OVERRIDE = 1.0
MIN_SPINDLE_OVERRIDE = 0.1
MAX_LINEAR_VELOCITY = 500.0
MAX_ANGULAR_VELOCITY = 360.0
DEFAULT_LINEAR_VELOCITY = 6.35
DEFAULT_SPINDLE_SPEED = 200
PROGRAM_PREFIX = /home/jon/linuxcnc/nc_files:nc_files
INTRO_GRAPHIC = /usr/share/linuxcnc/linuxcnc.gif
INTRO_TIME = 0
TOOL_EDITOR = tooledit
INCREMENTS = JOG 10mm 1mm .1mm .01mm .001mm

# Manual collet spindle — POCKETS=1 satisfies Probe Basic ATC-aware subroutines (tab hidden via ATC_TAB_DISPLAY=0)
[ATC]
POCKETS = 1

[FILTER]
PROGRAM_EXTENSION = .png,.gif,.jpg Grayscale Depth Image
PROGRAM_EXTENSION = .py Python Script
png = image-to-gcode
gif = image-to-gcode
jpg = image-to-gcode
py = python3

[TASK]
TASK = milltask
CYCLE_TIME = 0.001

[RS274NGC]
PARAMETER_FILE = linuxcnc.var
RS274NGC_STARTUP_CODE = F10 S300 G21 G17 G40 G49 G54 G64 P0.001 G80 G90 G91.1 G94 G97 G98
FEATURES = 30
OWORD_NARGS = 1
NO_DOWNCASE_OWORD = 1
ON_ABORT_COMMAND = o<on_abort> call
# TooTall18T Integration — tool_touch_off.ngc, m600.ngc, go_to_g30.ngc in probe_basic/subroutines
SUBROUTINE_PATH = .:probe_basic/subroutines
USER_M_PATH = .:probe_basic/subroutines
# TooTall18T Integration — semi-auto tool setter from CAM (do not remap M6)
REMAP=M600 modalgroup=6 ngc=m600

[EMCMOT]
EMCMOT = motmod
COMM_TIMEOUT = 1.0
SERVO_PERIOD = 1000000

[EMCIO]
EMCIO = io
CYCLE_TIME = 0.100
TOOL_TABLE = probe_basic/tool.tbl
# TooTall18T Integration — TOOL_CHANGE_POSITION removed; macro handles G30 via #5181-#5183
# TooTall18T Integration — M6 does not move to G30 or retract Z (macro does)
TOOL_CHANGE_AT_G30 = 0
TOOL_CHANGE_QUILL_UP = 0

[HAL]
TWOPASS = on
HALUI = halui
POSTGUI_HALFILE = probe_basic/probe_basic_postgui.hal
HALFILE = ethercat_loadusr.hal
HALFILE = ethercat_mill.hal
HALFILE = xhc-whb04b-6.hal
HALFILE = custom.hal

[HALUI]
MDI_COMMAND = G10 L20 P0 X0
MDI_COMMAND = G10 L20 P0 Y0
MDI_COMMAND = G10 L20 P0 Z0
MDI_COMMAND = G0 X[#<_x>/2]
MDI_COMMAND = G0 Y[#<_y>/2]
MDI_COMMAND = (debug, Macro 5)
MDI_COMMAND = (debug, Macro 6)
MDI_COMMAND = (debug, Macro 7)
MDI_COMMAND = (debug, Macro 8)
MDI_COMMAND = (debug, Macro 9)
MDI_COMMAND = (debug, Macro 10)
MDI_COMMAND = (debug, Macro 11)
MDI_COMMAND = (debug, Macro 12)
MDI_COMMAND = (debug, Macro 13)
MDI_COMMAND = (debug, Macro 14)

[TRAJ]
SPINDLES = 1
COORDINATES = XYZA
AXES = 4
LINEAR_UNITS = mm
ANGULAR_UNITS = degree
MAX_LINEAR_VELOCITY = 500.0
MAX_ANGULAR_VELOCITY = 360.0
DEFAULT_LINEAR_ACCELERATION = 2942.0
MAX_LINEAR_ACCELERATION = 2942.0
POSITION_FILE = position.txt
# BREAKOUT OFF: jog/run without finishing homing first. REVERT: comment out next line.
NO_FORCE_HOMING = 1

[KINS]
KINEMATICS = trivkins coordinates=XYZA
JOINTS = 4

[AXIS_X]
MAX_VELOCITY = 500.0
MAX_ACCELERATION = 2942.0
MIN_LIMIT = -254.0
MAX_LIMIT = 370.0

[AXIS_Y]
MAX_VELOCITY = 500.0
MAX_ACCELERATION = 2942.0
MIN_LIMIT = -254.0
MAX_LIMIT = 308.0

[AXIS_Z]
MAX_VELOCITY = 166.666667
MAX_ACCELERATION = 2942.0
MIN_LIMIT = -203.2
# Soft max must clear unhomed absolute encoder position (~10–20 mm) so Z can jog
# before HOME ALL. After a proper +Z home, machine zero is near 0; tighten back
# toward ~3 mm if you want a hard soft-stop just above home.
MAX_LIMIT = 50.0

[AXIS_A]
MAX_VELOCITY = 360.0
MAX_ACCELERATION = 1200.0
MIN_LIMIT = -9999.0
MAX_LIMIT = 9999.0

[JOINT_0]
TYPE = LINEAR
HOME = 0.000
MAX_VELOCITY = 500.0
MAX_ACCELERATION = 2942.0
MIN_LIMIT = -254.0
MAX_LIMIT = 370.0
# 17-bit encoder: 131072 counts/rev; 10 mm ball screw pitch -> 131072/10 counts/mm
SCALE = 13107.2
# Same-sign latch (search -, latch -): seek negative, back off positive until home clears, slow re-approach negative to latch. HOME_OFFSET=-2 then final +2 mm to 0.
HOME_OFFSET = -2.0
HOME_SEARCH_VEL = -66.666664
HOME_LATCH_VEL = -0.833333
HOME_FINAL_VEL = 3.333332
# REF ALL / home-all order: Z(0) → X(1) → Y(2) → A(3); distinct seq numbers = wait for prior to finish.
HOME_SEQUENCE = 1
HOME_IS_SHARED = 0
# Home at negative end shares the limit chain (Slave 0 DI1); must ignore limits during homing.
HOME_IGNORE_LIMITS = YES
HOME_USE_INDEX = NO
# Relaxed — was 2.0/1.0; restore wide limits so ferror does not trip during jog/home
FERROR = 1270.0
MIN_FERROR = 254.0

[JOINT_1]
TYPE = LINEAR
HOME = 0.000
MAX_VELOCITY = 500.0
MAX_ACCELERATION = 2942.0
MIN_LIMIT = -254.0
MAX_LIMIT = 308.0
HOME_OFFSET = -2.0
HOME_SEARCH_VEL = -66.666664
HOME_LATCH_VEL = -0.833333
HOME_FINAL_VEL = 3.333332
HOME_SEQUENCE = 2
HOME_IS_SHARED = 0
# Home at negative end shares the limit chain (Slave 0 DI2); must ignore limits during homing.
HOME_IGNORE_LIMITS = YES
HOME_USE_INDEX = NO
FERROR = 1270.0
MIN_FERROR = 254.0
SCALE = 13107.2

[JOINT_2]
TYPE = LINEAR
HOME = 0.0
MAX_VELOCITY = 166.666667
MAX_ACCELERATION = 2942.0
MIN_LIMIT = -203.2
MAX_LIMIT = 50.0
# Home on Slave 1 DI4 (+Z end); search toward +Z. -Z limit: Slave 2 DI2.
# HOME_OFFSET=+2 sets machine zero 2 mm below the home switch.
# First in REF ALL (seq 0). Search 2× prior; latch/final unchanged — Z fights gravity.
HOME_OFFSET = 2.0
HOME_SEARCH_VEL = 20.0
HOME_LATCH_VEL = 0.5
HOME_FINAL_VEL = 2.0
HOME_SEQUENCE = 0
HOME_IS_SHARED = 0
HOME_IGNORE_LIMITS = YES
HOME_USE_INDEX = NO
FERROR = 1270.0
MIN_FERROR = 254.0
SCALE = 13107.2

[JOINT_3]
TYPE = ANGULAR
HOME = 0.0
MAX_VELOCITY = 360.0
MAX_ACCELERATION = 1200.0
MIN_LIMIT = -9999.0
MAX_LIMIT = 9999.0
HOME_OFFSET = 0.0
# BREAKOUT OFF: last in REF ALL; zero search/latch = mark homed at current position (no A home switch).
HOME_SEARCH_VEL = 0.0
HOME_LATCH_VEL = 0.0
HOME_SEQUENCE = 3
FERROR = 1270.0
MIN_FERROR = 254.0
# Same 131072 counts/motor rev; ANGULAR_UNITS=degree -> 131072/360 counts/deg (motor uncoupled from load)
SCALE = 364.088888889

# Limit/home DI routing and EtherCAT motion HAL live in ethercat_mill.hal (not here).
