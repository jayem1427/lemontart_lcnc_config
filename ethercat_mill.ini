[EMC]
VERSION = 1.1
MACHINE = ethercat_mill
DEBUG = 0

[DISPLAY]
DISPLAY = probe_basic
DRO_DISPLAY = XYZA
GEOMETRY = XYZA
CONFIG_FILE = probe_basic/custom_config.yml
USER_BUTTONS_PATH = probe_basic/user_buttons/
USER_DROS_PATH = probe_basic/user_dro_display/
ATC_TAB_DISPLAY = 0
CYCLE_TIME = 0.100
POSITION_OFFSET = RELATIVE
POSITION_FEEDBACK = ACTUAL
MAX_FEED_OVERRIDE = 1.2
MAX_SPINDLE_OVERRIDE = 1.0
MIN_SPINDLE_OVERRIDE = 0.1
MAX_LINEAR_VELOCITY = 500.0
MAX_ANGULAR_VELOCITY = 360.0
DEFAULT_LINEAR_VELOCITY = 6.35
DEFAULT_SPINDLE_SPEED = 200
PROGRAM_PREFIX = nc_files
INTRO_GRAPHIC = /usr/share/linuxcnc/linuxcnc.gif
INTRO_TIME = 0
TOOL_EDITOR = tooledit
INCREMENTS = JOG 10mm 1mm .1mm .01mm .001mm

[FILTER]
PROGRAM_EXTENSION = .png,.gif,.jpg Grayscale Depth Image
PROGRAM_EXTENSION = .py Python Script
png = image-to-gcode
gif = image-to-gcode
jpg = image-to-gcode
py = python3

[TASK]
TASK = milltask
CYCLE_TIME = 0.001

[RS274NGC]
PARAMETER_FILE = linuxcnc.var
RS274NGC_STARTUP_CODE = F10 S300 G21 G17 G40 G49 G54 G64 P0.001 G80 G90 G91.1 G94 G97 G98
FEATURES = 30
OWORD_NARGS = 1
NO_DOWNCASE_OWORD = 1
ON_ABORT_COMMAND = o<on_abort> call
SUBROUTINE_PATH = .:probe_basic/subroutines
USER_M_PATH = .:probe_basic/subroutines

[EMCMOT]
EMCMOT = motmod
COMM_TIMEOUT = 1.0
SERVO_PERIOD = 1000000

[EMCIO]
EMCIO = io
CYCLE_TIME = 0.100
TOOL_TABLE = probe_basic/tool.tbl
TOOL_CHANGE_POSITION = 0 0 0
TOOL_CHANGE_QUILL_UP = 1

[HAL]
TWOPASS = on
HALUI = halui
POSTGUI_HALFILE = probe_basic/probe_basic_postgui.hal
HALFILE = ethercat_loadusr.hal
HALFILE = ethercat_mill.hal
HALFILE = xhc-whb04b-6.hal
HALFILE = custom.hal

[HALUI]
MDI_COMMAND = G10 L20 P0 X0
MDI_COMMAND = G10 L20 P0 Y0
MDI_COMMAND = G10 L20 P0 Z0
MDI_COMMAND = G0 X[#<_x>/2]
MDI_COMMAND = G0 Y[#<_y>/2]
MDI_COMMAND = (debug, Macro 5)
MDI_COMMAND = (debug, Macro 6)
MDI_COMMAND = (debug, Macro 7)
MDI_COMMAND = (debug, Macro 8)
MDI_COMMAND = (debug, Macro 9)
MDI_COMMAND = (debug, Macro 10)
MDI_COMMAND = (debug, Macro 11)
MDI_COMMAND = (debug, Macro 12)
MDI_COMMAND = (debug, Macro 13)
MDI_COMMAND = (debug, Macro 14)

[TRAJ]
SPINDLES = 1
COORDINATES = XYZA
LINEAR_UNITS = mm
ANGULAR_UNITS = degree
MAX_LINEAR_VELOCITY = 500.0
MAX_ANGULAR_VELOCITY = 360.0
DEFAULT_LINEAR_ACCELERATION = 2942.0
MAX_LINEAR_ACCELERATION = 2942.0
POSITION_FILE = position.txt
# BREAKOUT OFF: jog/run without finishing homing first. REVERT: comment out next line.
NO_FORCE_HOMING = 1

[KINS]
KINEMATICS = trivkins coordinates=XYZA
JOINTS = 4

[AXIS_X]
MAX_VELOCITY = 500.0
MAX_ACCELERATION = 2942.0
# BREAKOUT OFF: wide soft limits (hardware limits gagged in HAL). REVERT: -254 / 254
MIN_LIMIT = -9999.0
MAX_LIMIT = 9999.0

[AXIS_Y]
MAX_VELOCITY = 500.0
MAX_ACCELERATION = 2942.0
# BREAKOUT OFF: REVERT -254 / 254
MIN_LIMIT = -9999.0
MAX_LIMIT = 9999.0

[AXIS_Z]
MAX_VELOCITY = 166.666667
MAX_ACCELERATION = 2942.0
# BREAKOUT OFF: REVERT -203.2 / 3.048
MIN_LIMIT = -9999.0
MAX_LIMIT = 9999.0

[AXIS_A]
MAX_VELOCITY = 360.0
MAX_ACCELERATION = 1200.0
MIN_LIMIT = -9999.0
MAX_LIMIT = 9999.0

[JOINT_0]
TYPE = LINEAR
HOME = 0.000
MAX_VELOCITY = 500.0
MAX_ACCELERATION = 2942.0
MIN_LIMIT = -9999.0
MAX_LIMIT = 9999.0
# 17-bit encoder: 131072 counts/rev; 10 mm ball screw pitch -> 131072/10 counts/mm
SCALE = 13107.2
HOME_OFFSET = 0.0
# BREAKOUT OFF: immediate homing at current position (no switch motion). REVERT: search -2, latch 0.5, seq 1, IGNORE NO
HOME_SEARCH_VEL = 0.0
HOME_LATCH_VEL = 0.0
# Tier 0 — required first group; all joints were seq 1 only (no tier 0), which breaks HOME ALL / leaves joints unhomed.
HOME_SEQUENCE = 0
HOME_IS_SHARED = 0
HOME_IGNORE_LIMITS = YES
HOME_USE_INDEX = NO
FERROR = 1270.0
MIN_FERROR = 254.0

[JOINT_1]
TYPE = LINEAR
HOME = 0.000
MAX_VELOCITY = 500.0
MAX_ACCELERATION = 2942.0
MIN_LIMIT = -9999.0
MAX_LIMIT = 9999.0
HOME_OFFSET = 0.0
# BREAKOUT OFF: same as JOINT_0. REVERT: search -2 latch 0.5 IGNORE NO limits -254/254
HOME_SEARCH_VEL = 0.0
HOME_LATCH_VEL = 0.0
HOME_SEQUENCE = 0
HOME_IS_SHARED = 0
HOME_IGNORE_LIMITS = YES
HOME_USE_INDEX = NO
FERROR = 1270.0
MIN_FERROR = 254.0
SCALE = 13107.2

[JOINT_2]
TYPE = LINEAR
HOME = 0.0
MAX_VELOCITY = 166.666667
MAX_ACCELERATION = 2942.0
MIN_LIMIT = -9999.0
MAX_LIMIT = 9999.0
HOME_OFFSET = 0.0
# BREAKOUT OFF: immediate homing. REVERT: search 2 latch -0.5 seq 0 IGNORE NO limits -203.2/3.048
HOME_SEARCH_VEL = 0.0
HOME_LATCH_VEL = 0.0
HOME_SEQUENCE = 0
HOME_IS_SHARED = 0
HOME_IGNORE_LIMITS = YES
HOME_USE_INDEX = NO
FERROR = 1270.0
MIN_FERROR = 254.0
SCALE = 13107.2

[JOINT_3]
TYPE = ANGULAR
HOME = 0.0
MAX_VELOCITY = 360.0
MAX_ACCELERATION = 1200.0
MIN_LIMIT = -9999.0
MAX_LIMIT = 9999.0
HOME_OFFSET = 0.0
# BREAKOUT OFF: Rev All sets homed at position. REVERT: HOME_SEQUENCE = 2 (was after XYZ)
HOME_SEARCH_VEL = 0.0
HOME_LATCH_VEL = 0.0
HOME_SEQUENCE = 0
FERROR = 50.0
MIN_FERROR = 10.0
# Same 131072 counts/motor rev; ANGULAR_UNITS=degree -> 131072/360 counts/deg (motor uncoupled from load)
SCALE = 364.088888889

# Limit/home DI routing and EtherCAT motion HAL live in ethercat_mill.hal (not here).
